# etunl client config
# Place at ~/.etunl/config.yaml

server: tunnel.etunl.com
token: "change-me"
machine_name: homelab1

routes:
  - name: app
    type: http
    target: localhost:3030

  - name: server
    type: http
    target: localhost:3000

  # Optional protection on http routes. Pick ONE form per route.
  # Forms A and B (API-key) are checked both at the tunnel server (early
  # reject) and at the local proxy on this machine. Form C (session) is
  # enforced only at the tunnel server; the local proxy leaves it open.
  #
  # Form A: standard Authorization: Bearer <token>
  # - name: api
  #   type: http
  #   target: localhost:8080
  #   auth:
  #     bearer: "replace-with-a-long-random-secret"
  #
  # Form B: custom header name + value
  # - name: webhook
  #   type: http
  #   target: localhost:9000
  #   auth:
  #     header: "X-API-Key"
  #     value: "replace-with-a-long-random-secret"
  #
  # Form C: browser cookie session. Unauthenticated requests are
  # redirected to /___login___ on the route's host; the proxy serves
  # a login form there and sets a signed session cookie on success.
  # Sign out with /___logout___.
  # - name: app
  #   type: http
  #   target: localhost:3030
  #   auth:
  #     users:
  #       - user: ilya
  #         password: "change-me"

  - name: db1
    type: tcp
    target: localhost:5432
    local_port: 15432

  - name: db2
    type: tcp
    target: localhost:5433
    local_port: 15433
